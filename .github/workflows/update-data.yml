name: Actualizar datos diarios

on:
  schedule:
    # 23:00 UTC = 20:00 hora Argentina (UTC-3, todo el año, sin horario de verano)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar actualización de datos
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python scripts/update_data.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "monitor-real-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/live_data.json
          git diff --staged --quiet || git commit -m "Actualización automática de datos $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
